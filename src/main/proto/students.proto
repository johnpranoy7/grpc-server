syntax = "proto3";
option java_multiple_files = true;
package com.johnp.grpc;
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

message StudentProfileRequest {
  int64 student_id = 1;
}

message StudentProfileResponse {
  int64 student_id = 1;
  string first_name = 2;
  string last_name = 3;
  string email = 4;
  string program = 5;
  int32 current_semester = 6;
  double gpa = 7;
  google.protobuf.Timestamp enrollment_date = 8;
  repeated EnrolledCourse enrolled_courses = 9;
}

message StudentSummary {
  int64 student_id = 1;
  string first_name = 2;
  string last_name = 3;
  string program = 4;
  double gpa = 5;
}

message StudentCatalogResponse {
  repeated StudentSummary students = 1;
}

message CourseCatalogResponse {
  repeated CourseSummary courses = 1;
}

message EnrolledCourse {
  int64 course_id = 1;
  string course_name = 2;
  string term = 3;
  string status = 4;
  float grade = 5;
}

message CourseSummary {
  int64 course_id = 1;
  string course_name = 2;
  string course_code = 3;
  string credits = 4;
}

message StudentEnrollmentRequest {
  int64 student_id = 1;
  int64 course_id = 2;
  string term = 4;
  string status = 5;
  double grade = 6;
}

message FailedEnrollment {
  int64 student_id = 1;
  int64 course_id = 2;
  string reason_code = 3;
  string message = 4;
}

message BatchEnrollStudentsResponse {
  int32 success_count = 1;
  int32 failure_count = 2;
  repeated string failed_student_ids = 3;
  repeated FailedEnrollment failures = 4;
}

message EnrollmentIntent {
  int64 student_id = 1;
  int64 course_id = 2;
  string term = 3;
  string status = 4;
  double grade = 5;
}

message EnrollmentFeedback {
  int64 student_id = 1;
  int64 course_id = 2;
  string status = 3;
  string message = 4;
  double projected_gpa = 5;
  bool persisted = 6;
}

service StudentsService {
  rpc getStudentProfile (StudentProfileRequest) returns (StudentProfileResponse);
  rpc listStudentCatalog (google.protobuf.Empty) returns (StudentCatalogResponse);
  rpc listCourseCatalog (google.protobuf.Empty) returns (CourseCatalogResponse);
  rpc streamCourseCatalog (google.protobuf.Empty) returns (stream CourseSummary);
  rpc batchConsumeEnrollStudents (stream StudentEnrollmentRequest) returns (BatchEnrollStudentsResponse);
  rpc liveEnrollmentAdvising (stream EnrollmentIntent) returns (stream EnrollmentFeedback);
}
