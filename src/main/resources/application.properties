spring.application.name=grpc-server

# gRPC
spring.grpc.server.port=9090
spring.grpc.server.enabled=true

# HTTP (H2 console only — separate from gRPC)
server.port=9091

# H2 in-memory database
# Keep in-memory DB alive for app + H2 console connections
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=root
spring.datasource.password=toor
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true

# H2 console: http://localhost:9091/h2-console
# JDBC URL: jdbc:h2:mem:testdb  |  User: root  |  Password: toor
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Demo: drop UI-created enrollments periodically (keeps seed rows 1–6 from data.sql)
demo.enrollment-reset.enabled=true
# Default 30 minutes between automatic resets
demo.enrollment-reset.interval-ms=1800000
demo.enrollment-reset.seed-max-id=6
